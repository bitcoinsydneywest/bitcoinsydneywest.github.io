name: Update Meetup events

on:
  schedule:
    # Runs once a day at 03:00 UTC (~1-2pm Sydney time, depending on DST)
    - cron: '0 3 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

permissions:
  contents: write # allows this workflow to commit the updated events.json back to the repo

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Meetup events and build events.json
        run: python3 build_events.py

      - name: Commit updated events.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet || git commit -m "Update upcoming events from Meetup"
          git push
